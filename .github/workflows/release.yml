name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'AMO channel (unlisted = self-host, listed = public AMO)'
        required: true
        default: 'unlisted'
        type: choice
        options:
          - unlisted
          - listed

# Allow only one release at a time. Never cancel mid-flight; an interrupted
# AMO upload is a manual mess to clean up.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Releases + push to gh-pages
      pages: write
      id-token: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history for the gh-pages worktree

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version sync
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./public/manifest.json').version")
          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::package.json ($PKG_VERSION) and manifest.json ($MANIFEST_VERSION) drift. Run pnpm version:bump."
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            EXPECTED="v$PKG_VERSION"
            if [ "${GITHUB_REF_NAME}" != "$EXPECTED" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ($EXPECTED)."
              exit 1
            fi
          fi
          echo "value=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (production)
        run: pnpm build:prod

      - name: web-ext lint (manifest sanity, non-blocking)
        run: pnpm exec web-ext lint --source-dir=dist || true

      - name: Determine AMO channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=unlisted" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign + submit to AMO
        id: sign
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::error::AMO_JWT_ISSUER / AMO_JWT_SECRET secrets are not set."
            exit 1
          fi
          pnpm exec web-ext sign \
            --source-dir=dist \
            --artifacts-dir=web-ext-artifacts \
            --channel=${{ steps.channel.outputs.value }} \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"
          # Capture the signed XPI path for downstream steps.
          XPI_PATH=$(ls web-ext-artifacts/*.xpi | head -n1)
          if [ -z "$XPI_PATH" ]; then
            echo "::error::No signed XPI produced by web-ext sign."
            exit 1
          fi
          XPI_NAME=$(basename "$XPI_PATH")
          echo "xpi_path=$XPI_PATH" >> "$GITHUB_OUTPUT"
          echo "xpi_name=$XPI_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: contabox-${{ steps.version.outputs.value }}-xpi
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release (only on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: web-ext-artifacts/*.xpi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Auto-update via GitHub Pages -------------------------------------
      # Only on unlisted releases. AMO listed handles its own update channel.
      - name: Build Pages site (updates.json + index)
        if: steps.channel.outputs.value == 'unlisted' && github.ref_type == 'tag'
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ADDON_ID: contabox@galih.dev
          VERSION: ${{ steps.version.outputs.value }}
          XPI_NAME: ${{ steps.sign.outputs.xpi_name }}
          TAG: ${{ github.ref_name }}
        run: |
          pnpm build:landing

          XPI_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/${TAG}/${XPI_NAME}"

          # Pull existing updates.json (if any) so we keep previous versions.
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/updates.json"
          curl -fsSL "$PAGES_URL" -o existing.json || echo '{}' > existing.json

          UPDATE_LINK="$XPI_URL" \
            node scripts/build-updates-json.mjs > public-pages/updates.json

          REPO_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}" \
            UPDATES_URL="$PAGES_URL" \
            XPI_URL="$XPI_URL" \
            node scripts/render-landing.mjs

      - name: Setup Pages
        if: steps.channel.outputs.value == 'unlisted' && github.ref_type == 'tag'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.channel.outputs.value == 'unlisted' && github.ref_type == 'tag'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-pages

      - name: Deploy to GitHub Pages
        if: steps.channel.outputs.value == 'unlisted' && github.ref_type == 'tag'
        uses: actions/deploy-pages@v4
